      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Install NASM
        shell: pwsh
        run: |
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/win64/nasm-2.16.03-win64.zip"
          Invoke-WebRequest $url -OutFile nasm.zip
          Expand-Archive nasm.zip -DestinationPath C:\nasm
          $dir = (Get-ChildItem C:\nasm -Directory | Select-Object -First 1).FullName
          echo "$dir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-windows-x86_64
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
