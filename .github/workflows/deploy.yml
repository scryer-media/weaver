name: ci

on:
  push:
    tags:
      - "weaver-v*"

concurrency:
  group: weaver-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "25"
  RUST_TOOLCHAIN: "1.94"
  WEB_ARTIFACT_NAME: weaver-web-dist

jobs:
  # ── Parallel lint / check jobs (no dependencies) ─────────────────────────

  web-build:
    name: web-build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/weaver-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/weaver-web
        run: npm ci
      - name: Lint
        working-directory: apps/weaver-web
        run: npm run lint
      - name: Build web app
        working-directory: apps/weaver-web
        run: npm run build
      - name: Verify static output
        run: test -f apps/weaver-web/dist/index.html
      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
          if-no-files-found: error
          retention-days: 14

  rust-fmt:
    name: rust-fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check

  rust-audit:
    name: rust-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit

  # ── Jobs that need the web artifact ──────────────────────────────────────

  rust-clippy:
    name: rust-clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Install native build deps
        run: sudo apt-get install -y --no-install-recommends nasm
      - uses: Swatinem/rust-cache@v2
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Run clippy
        run: cargo clippy --workspace --locked --lib --bins --tests --examples -- -D warnings

  rust-test:
    name: rust-test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install native build deps
        run: sudo apt-get install -y --no-install-recommends nasm
      - uses: Swatinem/rust-cache@v2
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Run workspace tests
        run: cargo test --workspace --locked

  rust-test-arm:
    name: rust-test-arm
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run ARM-specific crate tests (NEON, CLMUL, PMULL)
        run: cargo test --locked -p weaver-par2 -p weaver-yenc -p weaver-rar --features weaver-par2/slow-tests

  rust-test-sde:
    name: rust-test-sde-${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: icl-gfni-avx2
            rustflags: "-C target-feature=+avx2,+gfni,+ssse3"
            sde_arch: "-icl"
          - name: spr-gfni-avx512
            rustflags: "-C target-feature=+avx512bw,+avx512vl,+avx2,+gfni,+ssse3"
            sde_arch: "-spr"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Intel SDE
        run: |
          curl -Lo /tmp/sde.tar.xz https://downloadmirror.intel.com/843185/sde-external-9.48.0-2024-11-25-lin.tar.xz
          tar -xf /tmp/sde.tar.xz -C /opt
          echo "/opt/sde-external-9.48.0-2024-11-25-lin" >> "$GITHUB_PATH"
      - name: Build par2 tests (${{ matrix.name }})
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo test --package weaver-par2 --features slow-tests --no-run --locked --message-format=json 2>/dev/null | jq -r 'select(.executable != null and .profile.test == true) | .executable' | sort -u > /tmp/test-bins.txt
      - name: Run tests under Intel SDE (${{ matrix.name }})
        run: |
          while IFS= read -r bin; do
            echo "::group::$(basename "$bin")"
            sde64 ${{ matrix.sde_arch }} -- "$bin" --test-threads=1
            echo "::endgroup::"
          done < /tmp/test-bins.txt

  # ── Release packaging (tag pushes only) ──────────────────────────────────

  rust-package:
    name: rust-package-${{ matrix.platform }}
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 60
    needs: [web-build, rust-fmt, rust-clippy, rust-audit, rust-test, rust-test-arm, rust-test-sde]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux-x86_64
            runs_on: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            platform: linux-arm64
            runs_on: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            runs_on: macos-26
          - target: x86_64-apple-darwin
            platform: darwin-x86_64
            runs_on: macos-26
          - target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            runs_on: windows-latest
          - target: aarch64-pc-windows-msvc
            platform: windows-arm64
            runs_on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Install musl toolchain
        if: contains(matrix.target, '-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - name: Install NASM (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y nasm
      - name: Install NASM (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: brew install nasm
      - name: Install NASM (Windows x86_64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/win64/nasm-2.16.03-win64.zip"
          Invoke-WebRequest $url -OutFile nasm.zip
          Expand-Archive nasm.zip -DestinationPath C:\nasm
          $dir = (Get-ChildItem C:\nasm -Directory | Select-Object -First 1).FullName
          echo "$dir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Exclude build dir from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
          key: ${{ matrix.platform }}
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags (Unix)
        if: runner.os != 'Windows'
        run: |
          case "${{ matrix.target }}" in
            x86_64-*)
              echo "RUSTFLAGS=-C target-cpu=haswell" >> "$GITHUB_ENV" ;;
            aarch64-apple-*)
              echo "RUSTFLAGS=-C target-cpu=apple-m1 --cfg aes_armv8 --cfg chacha20_force_neon" >> "$GITHUB_ENV" ;;
            aarch64-*-linux-*)
              echo "RUSTFLAGS=-C target-cpu=cortex-a72 --cfg aes_armv8 --cfg chacha20_force_neon" >> "$GITHUB_ENV" ;;
          esac
      - name: Set target CPU flags (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ matrix.target }}" -like "x86_64-*") {
            echo "RUSTFLAGS=-C target-cpu=haswell -C linker=rust-lld" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          } else {
            echo "RUSTFLAGS=-C target-cpu=cortex-a76 -C linker=rust-lld" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          }
      - name: Build release binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ matrix.target }}" == *"-musl" ]]; then
            mold -run cargo build -p weaver --release --locked --target ${{ matrix.target }}
          else
            cargo build -p weaver --release --locked --target ${{ matrix.target }}
          fi
      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p weaver --release --locked --target ${{ matrix.target }}
      - name: Codesign binary (macOS)
        if: contains(matrix.target, '-apple-darwin')
        env:
          CERT_P12: ${{ secrets.APPLE_SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASS="ci-ephemeral"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo -n "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          codesign --sign "Scryer Media Signing" --identifier media.weaver.app --force target/${{ matrix.target }}/release/weaver
          codesign --verify --verbose target/${{ matrix.target }}/release/weaver
          rm /tmp/cert.p12
          security delete-keychain "$KEYCHAIN"
      - name: Package tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/weaver dist/package/weaver
          tar -czf weaver-${{ matrix.platform }}.tar.gz -C dist/package .
      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target\${{ matrix.target }}\release\weaver.exe -DestinationPath weaver-${{ matrix.platform }}.zip
      - name: Upload release package (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: weaver-${{ matrix.platform }}-${{ github.run_id }}
          path: weaver-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 14
      - name: Upload release package (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: weaver-${{ matrix.platform }}-${{ github.run_id }}
          path: weaver-${{ matrix.platform }}.zip
          if-no-files-found: error
          retention-days: 14

  # ── Docker + GitHub Release (tag pushes only) ────────────────────────────

  docker-publish:
    name: docker-publish
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [rust-package]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-${{ github.run_id }}
          path: artifacts
      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-${{ github.run_id }}
          path: artifacts
      - name: Prepare build context
        run: |
          mkdir -p docker-ctx/amd64 docker-ctx/arm64
          tar -xzf artifacts/weaver-linux-x86_64.tar.gz -C docker-ctx/amd64
          tar -xzf artifacts/weaver-linux-arm64.tar.gz -C docker-ctx/arm64
          cp docker/entrypoint.sh docker-ctx/entrypoint.sh
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/weaver
          tags: |
            type=raw,value=latest
            type=sha
            type=match,pattern=weaver-v(.*),group=1
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker/weaver.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: github-release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [rust-package]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: weaver-*-${{ github.run_id }}
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/weaver-*.tar.gz \
            artifacts/weaver-*.zip
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#weaver-v}"
          LINUX_X86_SHA=$(shasum -a 256 artifacts/weaver-linux-x86_64.tar.gz | cut -d ' ' -f1)
          LINUX_ARM_SHA=$(shasum -a 256 artifacts/weaver-linux-arm64.tar.gz | cut -d ' ' -f1)
          DARWIN_ARM_SHA=$(shasum -a 256 artifacts/weaver-darwin-arm64.tar.gz | cut -d ' ' -f1)
          DARWIN_X86_SHA=$(shasum -a 256 artifacts/weaver-darwin-x86_64.tar.gz | cut -d ' ' -f1)
          REPO="${{ github.repository }}"

          mkdir -p formula
          cat > formula/weaver-usenet.rb << FORMULA
          class WeaverUsenet < Formula
            desc "Unified Usenet binary downloader, repair, and extraction engine"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM_SHA}"

                def install
                  bin.install "weaver"
                end
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-darwin-x86_64.tar.gz"
                sha256 "${DARWIN_X86_SHA}"

                def install
                  bin.install "weaver"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM_SHA}"

                def install
                  bin.install "weaver"
                end
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-linux-x86_64.tar.gz"
                sha256 "${LINUX_X86_SHA}"

                def install
                  bin.install "weaver"
                end
              end
            end

            service do
              run [opt_bin/"weaver", "--config", var/"weaver", "serve"]
              keep_alive true
              log_path var/"log/weaver.log"
              error_log_path var/"log/weaver.log"
            end

            test do
              assert_match "weaver", shell_output("#{bin}/weaver --version")
            end
          end
          FORMULA

          sed -i 's/^          //' formula/weaver-usenet.rb

          git clone "https://${TAP_TOKEN}@github.com/scryer-media/homebrew-weaver.git" tap-repo
          mkdir -p tap-repo/Formula
          cp formula/weaver-usenet.rb tap-repo/Formula/weaver-usenet.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/weaver-usenet.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
          else
            git commit -m "weaver ${VERSION}"
            git push origin HEAD:main
          fi
      - name: Trigger marketing site rebuild
        continue-on-error: true
        env:
          WEB_TOKEN: ${{ secrets.WEB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$WEB_TOKEN" ]; then
            echo "WEB_DISPATCH_TOKEN not set; skipping site rebuild."
            exit 0
          fi
          git clone "https://${WEB_TOKEN}@github.com/scryer-media/web.git" web-repo
          cd web-repo
          git config user.name "github-actions[bot]"
          git config user.email "133935777+NZBMan@users.noreply.github.com"
          git commit --allow-empty -m "rebuild: ${{ github.ref_name }}"
          git push origin HEAD:main
