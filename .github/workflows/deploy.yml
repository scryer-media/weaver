name: ci

on:
  push:
    tags:
      - "weaver-v*"

concurrency:
  group: weaver-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "25"
  RUST_TOOLCHAIN: "1.94"
  WEB_ARTIFACT_NAME: weaver-web-dist

jobs:
  # ── Parallel lint / check jobs (no dependencies) ─────────────────────────

  web-build:
    name: web-build
    runs-on: scryer-x86-linux
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/weaver-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/weaver-web
        run: npm ci
      - name: Lint
        working-directory: apps/weaver-web
        run: npm run lint
      - name: Build web app
        working-directory: apps/weaver-web
        run: npm run build
      - name: Verify static output
        run: test -f apps/weaver-web/dist/index.html
      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
          if-no-files-found: error
          retention-days: 14

  rust-fmt:
    name: rust-fmt
    runs-on: scryer-x86-linux
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check

  rust-audit:
    name: rust-audit
    runs-on: scryer-x86-linux
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit

  # ── Jobs that need the web artifact ──────────────────────────────────────

  rust-clippy:
    name: rust-clippy
    runs-on: scryer-x86-linux
    timeout-minutes: 20
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Install native build deps
        run: sudo apt-get install -y --no-install-recommends nasm
      - uses: Swatinem/rust-cache@v2
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Run clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

  rust-test:
    name: rust-test
    runs-on: scryer-x86-linux
    timeout-minutes: 45
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install native build deps
        run: sudo apt-get install -y --no-install-recommends nasm
      - uses: Swatinem/rust-cache@v2
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Run workspace tests
        run: cargo test --workspace --locked

  rust-test-arm:
    name: rust-test-arm
    runs-on: scryer-arm-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run ARM-specific crate tests (NEON, CLMUL, PMULL)
        run: cargo test --locked -p weaver-par2 -p weaver-yenc -p weaver-rar --features weaver-par2/slow-tests

  rust-test-sde:
    name: rust-test-sde-${{ matrix.name }}
    runs-on: scryer-x86-linux
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: icl-gfni-avx2
            rustflags: "-C target-feature=+avx2,+gfni,+ssse3"
            sde_arch: "-icl"
          - name: spr-gfni-avx512
            rustflags: "-C target-feature=+avx512bw,+avx512vl,+avx2,+gfni,+ssse3"
            sde_arch: "-spr"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Intel SDE
        run: |
          curl -Lo /tmp/sde.tar.xz https://downloadmirror.intel.com/843185/sde-external-9.48.0-2024-11-25-lin.tar.xz
          tar -xf /tmp/sde.tar.xz -C /opt
          echo "/opt/sde-external-9.48.0-2024-11-25-lin" >> "$GITHUB_PATH"
      - name: Build par2 tests (${{ matrix.name }})
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo test --package weaver-par2 --features slow-tests --no-run --locked --message-format=json 2>/dev/null | jq -r 'select(.executable != null and .profile.test == true) | .executable' | sort -u > /tmp/test-bins.txt
      - name: Run tests under Intel SDE (${{ matrix.name }})
        run: |
          while IFS= read -r bin; do
            echo "::group::$(basename "$bin")"
            sde64 ${{ matrix.sde_arch }} -- "$bin" --test-threads=1
            echo "::endgroup::"
          done < /tmp/test-bins.txt

  # ── Release packaging (tag pushes only) ──────────────────────────────────

  rust-package:
    name: rust-package-${{ matrix.platform }}
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 60
    needs: [web-build, rust-fmt, rust-clippy, rust-audit, rust-test, rust-test-arm, rust-test-sde]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux-x86_64
            runs_on: scryer-x86-linux
          - target: aarch64-unknown-linux-musl
            platform: linux-arm64
            runs_on: scryer-arm-linux
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            runs_on: macos-26-xlarge
          - target: x86_64-apple-darwin
            platform: darwin-x86_64
            runs_on: macos-26-large
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Install musl toolchain
        if: contains(matrix.target, '-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Build release binary
        run: |
          if [[ "${{ matrix.target }}" == *"-musl" ]]; then
            mold -run cargo build -p weaver --release --locked --target ${{ matrix.target }}
          else
            cargo build -p weaver --release --locked --target ${{ matrix.target }}
          fi
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/weaver dist/package/weaver
          tar -czf weaver-${{ matrix.platform }}.tar.gz -C dist/package .
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-${{ matrix.platform }}-${{ github.run_id }}
          path: weaver-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ── Docker + GitHub Release (tag pushes only) ────────────────────────────

  docker-publish:
    name: docker-publish
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: scryer-x86-linux
    timeout-minutes: 20
    needs: [rust-package]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-${{ github.run_id }}
          path: artifacts
      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-${{ github.run_id }}
          path: artifacts
      - name: Prepare build context
        run: |
          mkdir -p docker-ctx/amd64 docker-ctx/arm64
          tar -xzf artifacts/weaver-linux-x86_64.tar.gz -C docker-ctx/amd64
          tar -xzf artifacts/weaver-linux-arm64.tar.gz -C docker-ctx/arm64
          cp docker/entrypoint.sh docker-ctx/entrypoint.sh
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/weaver
          tags: |
            type=raw,value=latest
            type=sha
            type=match,pattern=weaver-v(.*),group=1
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker/weaver.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: github-release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: scryer-x86-linux
    timeout-minutes: 10
    needs: [rust-package]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: weaver-*-${{ github.run_id }}
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/weaver-*.tar.gz
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#weaver-v}"
          LINUX_X86_SHA=$(shasum -a 256 artifacts/weaver-linux-x86_64.tar.gz | cut -d ' ' -f1)
          LINUX_ARM_SHA=$(shasum -a 256 artifacts/weaver-linux-arm64.tar.gz | cut -d ' ' -f1)
          DARWIN_ARM_SHA=$(shasum -a 256 artifacts/weaver-darwin-arm64.tar.gz | cut -d ' ' -f1)
          DARWIN_X86_SHA=$(shasum -a 256 artifacts/weaver-darwin-x86_64.tar.gz | cut -d ' ' -f1)
          REPO="${{ github.repository }}"

          mkdir -p formula
          cat > formula/weaver-usenet.rb << FORMULA
          class WeaverUsenet < Formula
            desc "Unified Usenet binary downloader, repair, and extraction engine"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM_SHA}"

                def install
                  bin.install "weaver"
                end
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-darwin-x86_64.tar.gz"
                sha256 "${DARWIN_X86_SHA}"

                def install
                  bin.install "weaver"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM_SHA}"

                def install
                  bin.install "weaver"
                end
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/weaver-v${VERSION}/weaver-linux-x86_64.tar.gz"
                sha256 "${LINUX_X86_SHA}"

                def install
                  bin.install "weaver"
                end
              end
            end

            test do
              assert_match "weaver", shell_output("#{bin}/weaver --version")
            end
          end
          FORMULA

          sed -i 's/^          //' formula/weaver-usenet.rb

          git clone "https://${TAP_TOKEN}@github.com/scryer-media/homebrew-weaver.git" tap-repo
          mkdir -p tap-repo/Formula
          cp formula/weaver-usenet.rb tap-repo/Formula/weaver-usenet.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/weaver-usenet.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
          else
            git commit -m "weaver ${VERSION}"
            git push origin HEAD:main
          fi
