name: ci

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "weaver-v*"

concurrency:
  group: weaver-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "25"
  RUST_TOOLCHAIN: "1.96"
  WEAVER_ENABLE_DIAGNOSTICS: "0"
  WEB_ARTIFACT_NAME: weaver-web-dist
  RUST_TEST_BINARIES_ARTIFACT_NAME: weaver-rust-test-binaries
  WEAVER_LFS_RUST_TEST_INCLUDE: server/crates/weaver-server-core/tests/fixtures/**
  WEAVER_LFS_SDE_INCLUDE: ci/vendor/intel-sde/**

jobs:
  # ── Parallel lint / check jobs (no dependencies) ─────────────────────────

  web-build:
    name: web-build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/weaver-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/weaver-web
        run: npm ci
      - name: Lint
        working-directory: apps/weaver-web
        run: npm run lint
      - name: Build web app
        working-directory: apps/weaver-web
        run: npm run build
      - name: Verify static output
        run: test -f apps/weaver-web/dist/index.html
      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
          if-no-files-found: error
          retention-days: 14

  rust-fmt:
    name: rust-fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Check formatting
        run: cargo fmt --check

  rust-audit:
    name: rust-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo run -p xtask --locked -- ci audit

  # ── Jobs that need the web artifact ──────────────────────────────────────

  rust-clippy:
    name: rust-clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Run clippy
        run: cargo clippy --workspace --locked --lib --bins --tests --examples -- -D warnings

  rust-test-build:
    name: rust-test-build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [web-build]
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_CACHE_SIZE: 10G
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_IDLE_TIMEOUT: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm
      - name: Restore sccache directory
        id: rust-test-build-sccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: gha-sccache-v1-weaver-rust-test-build-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-weaver-rust-test-build-
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true
      - name: Build Rust test binaries
        run: |
          mkdir -p .ci/rust-tests
          cargo metadata --locked --format-version 1 > .ci/rust-tests/cargo-metadata.json
          cargo test \
            --workspace \
            --locked \
            --no-run \
            --no-fail-fast \
            --message-format=json-render-diagnostics \
            > .ci/rust-tests/cargo-test.json
          python3 .github/scripts/rust-test-manifest.py collect \
            --metadata .ci/rust-tests/cargo-metadata.json \
            --cargo-json .ci/rust-tests/cargo-test.json \
            --archive .ci/rust-tests/test-binaries.tar.gz \
            --workspace "$GITHUB_WORKSPACE"
      - name: Show sccache stats
        if: always()
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats
          else
            echo "sccache not installed; skipping stats"
          fi
      - name: Upload Rust test binaries
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RUST_TEST_BINARIES_ARTIFACT_NAME }}-${{ github.run_id }}
          path: .ci/rust-tests/test-binaries.tar.gz
          if-no-files-found: error
          retention-days: 7
      - name: Save sccache directory
        if: always() && steps.rust-test-build-sccache-restore.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: ${{ steps.rust-test-build-sccache-restore.outputs.cache-primary-key }}

  rust-test-regular:
    name: rust-test-regular
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [rust-test-build]
    steps:
      - uses: actions/checkout@v6
      - name: Hydrate Rust test fixtures
        run: |
          git lfs install --local
          git lfs pull --include="$WEAVER_LFS_RUST_TEST_INCLUDE" --exclude=""
      - name: Download Rust test binaries
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.RUST_TEST_BINARIES_ARTIFACT_NAME }}-${{ github.run_id }}
          path: .ci/rust-tests
      - name: Unpack Rust test binaries
        run: tar -xzf .ci/rust-tests/test-binaries.tar.gz -C .ci/rust-tests
      - name: Run regular Rust tests
        run: |
          python3 .github/scripts/rust-test-manifest.py run \
            --manifest .ci/rust-tests/manifest.json \
            --lane regular \
            --workspace "$GITHUB_WORKSPACE"

  rust-test-arm:
    name: rust-test-arm-yenc
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Run ARM-specific yEnc crate tests (NEON)
        run: cargo test --locked --no-fail-fast -p weaver-yenc

  rust-test-sde:
    name: rust-test-sde-yenc-${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: icl-gfni-avx2
            rustflags: "-C target-feature=+avx2,+gfni,+ssse3"
            sde_arch: "-icl"
          - name: spr-gfni-avx512
            rustflags: "-C target-feature=+avx512f,+avx512bw,+avx512vl,+avx512vbmi2,+avx2,+gfni,+ssse3"
            sde_arch: "-spr"
    steps:
      - uses: actions/checkout@v6
      - name: Hydrate Intel SDE
        run: |
          git lfs install --local
          git lfs pull --include="$WEAVER_LFS_SDE_INCLUDE" --exclude=""
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Install Intel SDE
        run: |
          SDE_ARCHIVE="ci/vendor/intel-sde/sde-external-9.48.0-2024-11-25-lin.tar.xz"
          echo "3173d2a5369e3385226b488d8b75403951bc14af601435fe707d9f83e0b533e6  ${SDE_ARCHIVE}" > /tmp/sde.sha256
          sha256sum -c /tmp/sde.sha256
          tar -xf "${SDE_ARCHIVE}" -C /opt
          echo "/opt/sde-external-9.48.0-2024-11-25-lin" >> "$GITHUB_PATH"
      - name: Build accelerated SIMD tests (${{ matrix.name }})
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -o pipefail
          cargo test --package weaver-yenc --lib --no-run --no-fail-fast --locked --target x86_64-unknown-linux-gnu --message-format=json \
            | jq -r 'select(.executable != null and .profile.test == true) | .executable' \
            | sort -u > /tmp/test-bins.txt
      - name: Run tests under Intel SDE (${{ matrix.name }})
        run: |
          failures=0
          run_sde() {
            if ! sde64 ${{ matrix.sde_arch }} -- "$@"; then
              failures=$((failures + 1))
            fi
          }
          while IFS= read -r bin; do
            echo "::group::$(basename "$bin")"
            case "$(basename "$bin")" in
              weaver_yenc-*)
                run_sde "$bin" simd::tests::decode_normal_run_dispatches --exact --test-threads=1
                run_sde "$bin" simd::tests::sse2_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::sse2_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::sse2_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::ssse3_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::ssse3_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::ssse3_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::sse41_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::sse41_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::sse41_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::avx_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::avx_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::avx_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::avx2_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::avx2_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::avx2_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::avx512_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::avx512_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::avx512_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::avx512_vbmi2_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                run_sde "$bin" simd::tests::avx512_vbmi2_block_handles_dot_stuffed_line_start --exact --test-threads=1
                run_sde "$bin" simd::tests::avx512_vbmi2_block_preserves_trailing_cr_state --exact --test-threads=1
                run_sde "$bin" simd::tests::forced_tier_kernels_match_scalar_with_line_hints --exact --test-threads=1
                run_sde "$bin" simd::tests::dispatch_kernel_matches_scalar_on_adversarial_streams --exact --test-threads=1
                run_sde "$bin" simd::tests::dispatch_kernel_matches_scalar_across_chunk_splits --exact --test-threads=1
                run_sde "$bin" simd::tests::dispatch_kernel_matches_scalar_on_hinted_encoded_streams --exact --test-threads=1
                run_sde "$bin" simd::tests::dispatch_kernel_handles_boundary_specials_like_scalar --exact --test-threads=1
                run_sde "$bin" decode::tests::decode_body_rapidyenc_generic_special_pattern --exact --test-threads=1
                ;;
              *)
                echo "unexpected SDE test binary: $(basename "$bin")" >&2
                exit 1
                ;;
            esac
            echo "::endgroup::"
          done < /tmp/test-bins.txt
          if [ "$failures" -ne 0 ]; then
            echo "$failures SDE test command(s) failed" >&2
            exit 1
          fi

  rust-yenc-simd-targets:
    name: rust-yenc-simd-${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: riscv64gc
            target: riscv64gc-unknown-linux-gnu
            target_env: RISCV64GC_UNKNOWN_LINUX_GNU
            rustflags: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: yenc-simd-${{ matrix.name }}
      - name: Check weaver-yenc target
        env:
          TARGET_ENV: ${{ matrix.target_env }}
          TARGET_RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [ -n "$TARGET_RUSTFLAGS" ]; then
            export "CARGO_TARGET_${TARGET_ENV}_RUSTFLAGS=$TARGET_RUSTFLAGS"
          fi
          cargo check --locked -p weaver-yenc --target ${{ matrix.target }}

  # ── Release packaging (tag pushes only) ──────────────────────────────────

  rust-package-linux-x86_64-portable:
    name: rust-package-linux-x86_64-portable
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-x86_64-portable
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target x86_64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/x86_64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-x86_64-portable.tar.gz -C dist/package .
          test -f weaver-linux-x86_64-portable.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-x86_64-portable-${{ github.run_id }}
          path: weaver-linux-x86_64-portable.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-linux-x86_64-haswell:
    name: rust-package-linux-x86_64-haswell
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-x86_64-haswell
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-unknown-linux-musl" --lane haswell)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target x86_64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/x86_64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-x86_64-haswell.tar.gz -C dist/package .
          test -f weaver-linux-x86_64-haswell.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-x86_64-haswell-${{ github.run_id }}
          path: weaver-linux-x86_64-haswell.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-linux-arm64-portable:
    name: rust-package-linux-arm64-portable
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-arm64-portable
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "aarch64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target aarch64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/aarch64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-arm64-portable.tar.gz -C dist/package .
          test -f weaver-linux-arm64-portable.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-arm64-portable-${{ github.run_id }}
          path: weaver-linux-arm64-portable.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-linux-arm64-cortex-a76:
    name: rust-package-linux-arm64-cortex-a76
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-arm64-cortex-a76
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "aarch64-unknown-linux-musl" --lane cortex-a76)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target aarch64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/aarch64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-arm64-cortex-a76.tar.gz -C dist/package .
          test -f weaver-linux-arm64-cortex-a76.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-arm64-cortex-a76-${{ github.run_id }}
          path: weaver-linux-arm64-cortex-a76.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-darwin-x86_64-haswell:
    name: rust-package-darwin-x86_64-haswell
    runs-on: macos-26
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-apple-darwin
      - name: Install NASM
        run: brew install nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-darwin-x86_64-haswell
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-apple-darwin" --lane haswell)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: cargo build -p weaver --release --locked --target x86_64-apple-darwin
      - name: Codesign binary
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
        env:
          CERT_P12: ${{ secrets.APPLE_SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASS="ci-ephemeral"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
