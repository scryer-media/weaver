  # ── Docker validation + release publish ──────────────────────────────────

  docker-export:
    name: docker-export-${{ matrix.platform_id }}
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 20
    needs:
      - rust-fmt
      - rust-clippy
      - rust-audit
      - rust-test
      - rust-test-arm
      - rust-test-sde
      - rust-yenc-simd-targets
      - rust-crypto-targets
      - rust-package-linux-x86_64-portable
      - rust-package-linux-x86_64-haswell
      - rust-package-linux-arm64-portable
      - rust-package-linux-arm64-cortex-a76
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: amd64
            runs_on: ubuntu-24.04
            platform: linux/amd64
            tar_name: weaver-linux-amd64-image.tar
            local_tag: weaver:test-amd64
          - platform_id: arm64
            runs_on: ubuntu-24.04-arm
            platform: linux/arm64
            tar_name: weaver-linux-arm64-image.tar
            local_tag: weaver:test-arm64
    steps:
      - uses: actions/checkout@v6
      - name: Download linux amd64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download linux amd64 haswell artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-haswell-${{ github.run_id }}
          path: artifacts
      - name: Download linux arm64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download linux arm64 cortex-a76 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-cortex-a76-${{ github.run_id }}
          path: artifacts
      - name: Validate Docker runtime selector
        run: sh docker/test_runtime_select.sh
      - name: Validate Docker docs contract
        if: matrix.platform_id == 'amd64'
        run: sh docker/test_docs_contract.sh
      - name: Prepare build context
        run: sh docker/prepare-build-context.sh artifacts docker-ctx
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build downloadable image tarball
        uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker/weaver.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=docker,dest=/tmp/${{ matrix.tar_name }}
          tags: ${{ matrix.local_tag }}
      - name: Load built image
        run: docker load -i /tmp/${{ matrix.tar_name }}
      - name: Smoke test image runtime
        run: sh docker/test_image_runtime.sh ${{ matrix.local_tag }} ${{ matrix.platform }}
      - name: Upload image tarball
        uses: actions/upload-artifact@v7
        with:
          name: weaver-image-linux-${{ matrix.platform_id }}-${{ github.run_id }}
          path: /tmp/${{ matrix.tar_name }}
          if-no-files-found: error
          retention-days: 14
      - name: Add local test instructions
        run: |
          {
            echo "### Downloadable Docker image (${{ matrix.platform }})"
            echo
            echo "- Artifact: \`weaver-image-linux-${{ matrix.platform_id }}-${{ github.run_id }}\`"
            echo "- Tarball: \`${{ matrix.tar_name }}\`"
            echo "- Load: \`docker load -i ${{ matrix.tar_name }}\`"
            echo "- Run: \`docker run --rm -p 9090:9090 ${{ matrix.local_tag }} --config /config serve --port 9090\`"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-publish:
    name: docker-publish
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - rust-fmt
      - rust-clippy
      - rust-audit
      - rust-test
      - rust-test-arm
      - rust-test-sde
      - rust-yenc-simd-targets
      - rust-crypto-targets
      - rust-package-linux-x86_64-portable
      - rust-package-linux-x86_64-haswell
      - rust-package-linux-arm64-portable
      - rust-package-linux-arm64-cortex-a76
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Download linux amd64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download linux amd64 haswell artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-haswell-${{ github.run_id }}
          path: artifacts
      - name: Download linux arm64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download linux arm64 cortex-a76 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-cortex-a76-${{ github.run_id }}
          path: artifacts
      - name: Validate Docker runtime selector
        run: sh docker/test_runtime_select.sh
      - name: Validate Docker docs contract
        run: sh docker/test_docs_contract.sh
      - name: Prepare build context
        run: sh docker/prepare-build-context.sh artifacts docker-ctx
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/weaver
          tags: |
            type=raw,value=latest
            type=match,pattern=weaver-v(.*),group=1
      - name: Compute Docker tags
        id: tags
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/weaver
        run: |
          VERSION="${GITHUB_REF_NAME#weaver-v}"
          SHORT_SHA=$(printf '%s' "$GITHUB_SHA" | cut -c1-7)
          {
            echo "base<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:sha-${SHORT_SHA}"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push base image
        id: build_base
        uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: docker/weaver.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.base }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Sign published base image
        env:
          TAGS: ${{ steps.tags.outputs.base }}
          DIGEST: ${{ steps.build_base.outputs.digest }}
        run: |
          images_file="$(mktemp)"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            printf '%s@%s\n' "$tag" "$DIGEST" >> "$images_file"
          done <<EOF
          $TAGS
          EOF
          xargs cosign sign --yes < "$images_file"

  github-release:
    name: github-release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/weaver-v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - rust-fmt
      - rust-clippy
      - rust-audit
      - rust-test
      - rust-test-arm
      - rust-test-sde
      - rust-yenc-simd-targets
      - rust-crypto-targets
      - rust-package-linux-x86_64-portable
      - rust-package-linux-x86_64-haswell
      - rust-package-linux-arm64-portable
      - rust-package-linux-arm64-cortex-a76
      - rust-package-darwin-x86_64-portable
      - rust-package-darwin-x86_64-haswell
      - rust-package-darwin-arm64-portable
      - rust-package-darwin-arm64-apple-m1
      - rust-package-windows-x86_64
      - rust-package-windows-arm64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download linux x86_64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download linux x86_64 haswell artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-x86_64-haswell-${{ github.run_id }}
          path: artifacts
      - name: Download linux arm64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download linux arm64 cortex-a76 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-linux-arm64-cortex-a76-${{ github.run_id }}
          path: artifacts
      - name: Download darwin x86_64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-darwin-x86_64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download darwin x86_64 haswell artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-darwin-x86_64-haswell-${{ github.run_id }}
          path: artifacts
      - name: Download darwin arm64 portable artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-darwin-arm64-portable-${{ github.run_id }}
          path: artifacts
      - name: Download darwin arm64 apple-m1 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-darwin-arm64-apple-m1-${{ github.run_id }}
          path: artifacts
      - name: Download windows x86_64 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-windows-x86_64-${{ github.run_id }}
          path: artifacts
      - name: Download windows arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: weaver-windows-arm64-${{ github.run_id }}
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/weaver-*.tar.gz \
            artifacts/weaver-*.zip
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#weaver-v}"
          LINUX_X86_PORTABLE_SHA=$(shasum -a 256 artifacts/weaver-linux-x86_64-portable.tar.gz | cut -d ' ' -f1)
          LINUX_X86_HASWELL_SHA=$(shasum -a 256 artifacts/weaver-linux-x86_64-haswell.tar.gz | cut -d ' ' -f1)
          LINUX_ARM_PORTABLE_SHA=$(shasum -a 256 artifacts/weaver-linux-arm64-portable.tar.gz | cut -d ' ' -f1)
          LINUX_ARM_CORTEX_A76_SHA=$(shasum -a 256 artifacts/weaver-linux-arm64-cortex-a76.tar.gz | cut -d ' ' -f1)
          DARWIN_X86_PORTABLE_SHA=$(shasum -a 256 artifacts/weaver-darwin-x86_64-portable.tar.gz | cut -d ' ' -f1)
          DARWIN_X86_HASWELL_SHA=$(shasum -a 256 artifacts/weaver-darwin-x86_64-haswell.tar.gz | cut -d ' ' -f1)
          DARWIN_ARM_PORTABLE_SHA=$(shasum -a 256 artifacts/weaver-darwin-arm64-portable.tar.gz | cut -d ' ' -f1)
          DARWIN_ARM_APPLE_M1_SHA=$(shasum -a 256 artifacts/weaver-darwin-arm64-apple-m1.tar.gz | cut -d ' ' -f1)
          REPO="${{ github.repository }}"

          mkdir -p formula
          cat > formula/weaver-usenet.rb << FORMULA
          require "open3"
          require "rbconfig"
          require "set"

          module WeaverUsenetReleaseSelection
            X86_HASWELL_FEATURES = %w[
              avx
              avx2
              bmi1
              bmi2
              f16c
              fma
              lzcnt
              movbe
              pclmulqdq
              popcnt
              rdrand
              sse3
              sse4.1
              sse4.2
              ssse3
              xsave
              xsaveopt
            ].freeze

            LINUX_ARM64_CORTEX_A76_FEATURES = %w[
              aes
              crc32
              dotprod
              fp16
              lse
              neon
              rdm
              sha2
            ].freeze

            MACOS_ARM64_APPLE_M1_FEATURES = %w[
              aes
              dotprod
              fp16
              lse
              neon
              sha2
            ].freeze

            def self.current_os
              host_os = RbConfig::CONFIG["host_os"].to_s.downcase
              return "macos" if host_os.include?("darwin")
              return "linux" if host_os.include?("linux")

              "unknown"
            end

            def self.current_arch
              host_cpu = RbConfig::CONFIG["host_cpu"].to_s.downcase
              return "arm64" if host_cpu.include?("aarch64") || host_cpu.include?("arm64")
              return "x86_64" if host_cpu.include?("x86_64") || host_cpu.include?("amd64")

              "unknown"
            end

            def self.current_lane
              detect_lane(
                os: current_os,
                arch: current_arch,
                linux_cpuinfo: current_os == "linux" ? read_linux_cpuinfo : nil,
                sysctl_values: current_os == "macos" ? read_macos_sysctl_values(current_arch) : {},
              )
            end

            def self.detect_lane(os:, arch:, linux_cpuinfo: nil, sysctl_values: {})
              case [os, arch]
              when ["macos", "x86_64"]
                normalized = normalize_x86_features(
                  sysctl_feature_tokens(
                    sysctl_values["machdep.cpu.features"],
                    sysctl_values["machdep.cpu.leaf7_features"],
                  ),
                )
                normalized.superset?(X86_HASWELL_FEATURES.to_set) ? "haswell" : "portable"
              when ["linux", "x86_64"]
                normalized = normalize_x86_features(cpuinfo_feature_tokens(linux_cpuinfo))
                normalized.superset?(X86_HASWELL_FEATURES.to_set) ? "haswell" : "portable"
              when ["macos", "arm64"]
                required = {
                  "aes" => "hw.optional.arm.FEAT_AES",
                  "dotprod" => "hw.optional.arm.FEAT_DotProd",
                  "fp16" => "hw.optional.arm.FEAT_FP16",
                  "lse" => "hw.optional.arm.FEAT_LSE",
                  "neon" => "hw.optional.arm.AdvSIMD",
                  "sha2" => "hw.optional.arm.FEAT_SHA256",
                }
                present = required.all? do |_feature, key|
                  truthy_sysctl?(sysctl_values[key])
                end
                present ? "apple-m1" : "portable"
              when ["linux", "arm64"]
                normalized = normalize_linux_arm64_features(cpuinfo_feature_tokens(linux_cpuinfo))
                normalized.superset?(LINUX_ARM64_CORTEX_A76_FEATURES.to_set) ? "cortex-a76" : "portable"
              else
                "portable"
              end
            end

            def self.asset_name(os:, arch:, lane:)
              case [os, arch, lane]
              when ["linux", "x86_64", "portable"] then "weaver-linux-x86_64-portable.tar.gz"
              when ["linux", "x86_64", "haswell"] then "weaver-linux-x86_64-haswell.tar.gz"
              when ["linux", "arm64", "portable"] then "weaver-linux-arm64-portable.tar.gz"
              when ["linux", "arm64", "cortex-a76"] then "weaver-linux-arm64-cortex-a76.tar.gz"
              when ["macos", "x86_64", "portable"] then "weaver-darwin-x86_64-portable.tar.gz"
              when ["macos", "x86_64", "haswell"] then "weaver-darwin-x86_64-haswell.tar.gz"
              when ["macos", "arm64", "portable"] then "weaver-darwin-arm64-portable.tar.gz"
              when ["macos", "arm64", "apple-m1"] then "weaver-darwin-arm64-apple-m1.tar.gz"
              else
                raise "unsupported asset mapping: #{[os, arch, lane].inspect}"
              end
            end

            def self.asset_url(repo:, version:, os:, arch:, lane:)
              "https://github.com/#{repo}/releases/download/weaver-v#{version}/#{asset_name(os: os, arch: arch, lane: lane)}"
            end

            def self.asset_sha256(os:, arch:, lane:, checksums:)
              checksums.fetch(asset_name(os: os, arch: arch, lane: lane))
            end

            def self.read_linux_cpuinfo
              File.read("/proc/cpuinfo")
            rescue StandardError
              nil
            end

            def self.read_macos_sysctl_values(arch)
              values = {}
              if arch == "x86_64"
                %w[
                  machdep.cpu.features
                  machdep.cpu.leaf7_features
                ].each do |key|
                  values[key] = read_sysctl(key)
                end
              elsif arch == "arm64"
                %w[
                  hw.optional.arm.FEAT_AES
                  hw.optional.arm.FEAT_DotProd
                  hw.optional.arm.FEAT_FP16
                  hw.optional.arm.FEAT_LSE
                  hw.optional.arm.AdvSIMD
                  hw.optional.arm.FEAT_SHA256
                ].each do |key|
                  values[key] = read_sysctl(key)
                end
              end
              values
            end

            def self.read_sysctl(name)
              output, status = Open3.capture2("sysctl", "-n", name)
              status.success? ? output.strip : nil
            rescue StandardError
              nil
            end

            def self.cpuinfo_feature_tokens(cpuinfo_text)
              return [] if cpuinfo_text.to_s.empty?

              cpuinfo_text.each_line.filter_map do |line|
                match = line.match(/^\s*(flags|Features)\s*:\s*(.+)$/i)
                next unless match

                match[2].split(/\s+/)
              end.flatten
            end

            def self.sysctl_feature_tokens(*values)
              values.compact.flat_map { |value| value.split(/\s+/) }
            end

            def self.normalize_x86_features(tokens)
              tokens.each_with_object(Set.new) do |token, features|
                normalized = normalize_x86_feature(token)
                features << normalized if normalized
              end
            end

            def self.normalize_linux_arm64_features(tokens)
              tokens.each_with_object(Set.new) do |token, features|
                normalized = normalize_linux_arm64_feature(token)
                features << normalized if normalized
              end
            end

            def self.normalize_x86_feature(token)
              case token.to_s.downcase
              when "avx", "avx1.0" then "avx"
              when "avx2", "avx2.0" then "avx2"
              when "bmi1" then "bmi1"
              when "bmi2" then "bmi2"
              when "f16c" then "f16c"
              when "fma" then "fma"
              when "abm", "lzcnt" then "lzcnt"
              when "movbe" then "movbe"
              when "pclmul", "pclmulqdq" then "pclmulqdq"
              when "popcnt" then "popcnt"
              when "rdrand" then "rdrand"
              when "sse3" then "sse3"
              when "sse4_1", "sse4.1" then "sse4.1"
              when "sse4_2", "sse4.2" then "sse4.2"
              when "ssse3" then "ssse3"
              when "osxsave", "xsave" then "xsave"
              when "xsaveopt" then "xsaveopt"
              end
            end

            def self.normalize_linux_arm64_feature(token)
              case token.to_s.downcase
              when "aes" then "aes"
              when "crc", "crc32" then "crc32"
              when "asimddp", "dotprod" then "dotprod"
              when "fphp", "asimdhp", "fp16" then "fp16"
              when "atomics", "lse" then "lse"
              when "asimd", "neon" then "neon"
              when "asimdrdm", "rdm" then "rdm"
              when "sha2" then "sha2"
              end
            end

            def self.truthy_sysctl?(value)
              value.to_s.strip == "1"
            end
          end

          class WeaverUsenet < Formula
            desc "Unified Usenet binary downloader, repair, and extraction engine"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"
            RELEASE_REPO = "${REPO}"
            RELEASE_VERSION = "${VERSION}"
            CHECKSUMS = {
              "weaver-linux-x86_64-portable.tar.gz" => "${LINUX_X86_PORTABLE_SHA}",
              "weaver-linux-x86_64-haswell.tar.gz" => "${LINUX_X86_HASWELL_SHA}",
              "weaver-linux-arm64-portable.tar.gz" => "${LINUX_ARM_PORTABLE_SHA}",
              "weaver-linux-arm64-cortex-a76.tar.gz" => "${LINUX_ARM_CORTEX_A76_SHA}",
              "weaver-darwin-x86_64-portable.tar.gz" => "${DARWIN_X86_PORTABLE_SHA}",
              "weaver-darwin-x86_64-haswell.tar.gz" => "${DARWIN_X86_HASWELL_SHA}",
              "weaver-darwin-arm64-portable.tar.gz" => "${DARWIN_ARM_PORTABLE_SHA}",
              "weaver-darwin-arm64-apple-m1.tar.gz" => "${DARWIN_ARM_APPLE_M1_SHA}",
            }.freeze
            SELECTED_OS = WeaverUsenetReleaseSelection.current_os
            SELECTED_ARCH = WeaverUsenetReleaseSelection.current_arch
            SELECTED_LANE = WeaverUsenetReleaseSelection.current_lane

            url WeaverUsenetReleaseSelection.asset_url(
              repo: RELEASE_REPO,
              version: RELEASE_VERSION,
              os: SELECTED_OS,
              arch: SELECTED_ARCH,
              lane: SELECTED_LANE,
            )
            sha256 WeaverUsenetReleaseSelection.asset_sha256(
              os: SELECTED_OS,
              arch: SELECTED_ARCH,
              lane: SELECTED_LANE,
              checksums: CHECKSUMS,
            )

            def install_support_files
              (pkgshare/"config.env.example").write <<~EOS
                # Homebrew-managed Weaver service overrides.
                WEAVER_CONFIG=#{var}/weaver
                WEAVER_PORT=9090
                WEAVER_BASE_URL=/
              EOS

              (libexec/"weaver-service").write <<~SH
                #!/bin/sh
                CONFIG_FILE="#{etc}/weaver/config.env"

                if [ -f "\$CONFIG_FILE" ]; then
                  set -a
                  . "\$CONFIG_FILE"
                  set +a
                fi

                : "\${WEAVER_CONFIG:=#{var}/weaver}"
                : "\${WEAVER_PORT:=9090}"
                : "\${WEAVER_BASE_URL:=/}"

                exec "#{opt_bin}/weaver" --config "\$WEAVER_CONFIG" serve --port "\$WEAVER_PORT" --base-url "\$WEAVER_BASE_URL" "\$@"
              SH

              chmod 0755, libexec/"weaver-service"
            end

            def install
              bin.install "weaver"
              install_support_files

              config_dir = etc/"weaver"
              config_dir.mkpath
              config_file = config_dir/"config.env"
              unless config_file.exist?
                config_file.write <<~EOS
                  WEAVER_CONFIG=#{var}/weaver
                  WEAVER_PORT=9090
                  WEAVER_BASE_URL=/
                EOS
              end
            end

            def caveats
              <<~EOS
                Edit #{etc}/weaver/config.env to customize the Homebrew-managed service,
                then restart it with:
                  brew services restart weaver-usenet
              EOS
            end

            service do
              run [opt_libexec/"weaver-service"]
              keep_alive true
              log_path var/"log/weaver.log"
              error_log_path var/"log/weaver.log"
            end

            test do
              assert_match "weaver", shell_output("#{bin}/weaver --version")
            end
          end
          FORMULA

          sed -i 's/^          //' formula/weaver-usenet.rb
      - name: Smoke test Homebrew asset selection
        run: |
          ruby <<'RUBY'
          source = File.read("formula/weaver-usenet.rb")
          helper_source = source.split(/^class WeaverUsenet < Formula$/).first
          eval(helper_source, TOPLEVEL_BINDING, "formula/weaver-usenet.rb")

          def assert_equal(expected, actual, label)
            raise "#{label}: expected #{expected.inspect}, got #{actual.inspect}" unless expected == actual
          end

          linux_x86_full = <<~CPUINFO
            flags : sse3 ssse3 sse4_1 sse4_2 avx avx2 bmi1 bmi2 f16c fma lzcnt movbe pclmulqdq popcnt rdrand xsave xsaveopt
          CPUINFO
          linux_x86_abm = <<~CPUINFO
            flags : sse3 ssse3 sse4_1 sse4_2 avx avx2 bmi1 bmi2 f16c fma abm movbe pclmulqdq popcnt rdrand xsave xsaveopt
          CPUINFO
          linux_x86_portable = <<~CPUINFO
            flags : sse3 ssse3 sse4_1 sse4_2 avx bmi1 bmi2 f16c fma lzcnt movbe pclmulqdq popcnt rdrand xsave xsaveopt
          CPUINFO
          linux_arm_full = <<~CPUINFO
            Features : fp asimd aes sha2 crc32 atomics fphp asimdrdm asimddp
          CPUINFO
          linux_arm_portable = <<~CPUINFO
            Features : fp asimd aes sha2 crc32 atomics fphp asimdrdm
          CPUINFO
          macos_x86_full = {
            "machdep.cpu.features" => "SSE3 SSSE3 SSE4.1 SSE4.2 FMA MOVBE POPCNT AVX1.0 RDRAND F16C XSAVE OSXSAVE",
            "machdep.cpu.leaf7_features" => "AVX2 BMI1 BMI2 LZCNT PCLMULQDQ XSAVEOPT",
          }
          macos_x86_portable = {
            "machdep.cpu.features" => "SSE3 SSSE3 SSE4.1 SSE4.2 FMA MOVBE POPCNT AVX1.0 RDRAND F16C XSAVE OSXSAVE",
            "machdep.cpu.leaf7_features" => "BMI1 BMI2 LZCNT PCLMULQDQ XSAVEOPT",
          }
          macos_arm_full = {
            "hw.optional.arm.FEAT_AES" => "1",
            "hw.optional.arm.FEAT_DotProd" => "1",
            "hw.optional.arm.FEAT_FP16" => "1",
            "hw.optional.arm.FEAT_LSE" => "1",
            "hw.optional.arm.AdvSIMD" => "1",
            "hw.optional.arm.FEAT_SHA256" => "1",
          }
          macos_arm_portable = macos_arm_full.merge("hw.optional.arm.FEAT_DotProd" => "0")

          assert_equal("haswell", WeaverUsenetReleaseSelection.detect_lane(os: "linux", arch: "x86_64", linux_cpuinfo: linux_x86_full), "linux x86 optimized lane")
          assert_equal("haswell", WeaverUsenetReleaseSelection.detect_lane(os: "linux", arch: "x86_64", linux_cpuinfo: linux_x86_abm), "linux x86 abm optimized lane")
          assert_equal("portable", WeaverUsenetReleaseSelection.detect_lane(os: "linux", arch: "x86_64", linux_cpuinfo: linux_x86_portable), "linux x86 portable lane")
          assert_equal("cortex-a76", WeaverUsenetReleaseSelection.detect_lane(os: "linux", arch: "arm64", linux_cpuinfo: linux_arm_full), "linux arm optimized lane")
          assert_equal("portable", WeaverUsenetReleaseSelection.detect_lane(os: "linux", arch: "arm64", linux_cpuinfo: linux_arm_portable), "linux arm portable lane")
          assert_equal("haswell", WeaverUsenetReleaseSelection.detect_lane(os: "macos", arch: "x86_64", sysctl_values: macos_x86_full), "macos x86 optimized lane")
          assert_equal("portable", WeaverUsenetReleaseSelection.detect_lane(os: "macos", arch: "x86_64", sysctl_values: macos_x86_portable), "macos x86 portable lane")
          assert_equal("apple-m1", WeaverUsenetReleaseSelection.detect_lane(os: "macos", arch: "arm64", sysctl_values: macos_arm_full), "macos arm optimized lane")
          assert_equal("portable", WeaverUsenetReleaseSelection.detect_lane(os: "macos", arch: "arm64", sysctl_values: macos_arm_portable), "macos arm portable lane")

          checksums = {
            "weaver-linux-x86_64-portable.tar.gz" => "linux-x86-portable",
            "weaver-linux-x86_64-haswell.tar.gz" => "linux-x86-haswell",
            "weaver-linux-arm64-portable.tar.gz" => "linux-arm-portable",
            "weaver-linux-arm64-cortex-a76.tar.gz" => "linux-arm-cortex-a76",
            "weaver-darwin-x86_64-portable.tar.gz" => "darwin-x86-portable",
            "weaver-darwin-x86_64-haswell.tar.gz" => "darwin-x86-haswell",
            "weaver-darwin-arm64-portable.tar.gz" => "darwin-arm-portable",
            "weaver-darwin-arm64-apple-m1.tar.gz" => "darwin-arm-apple-m1",
          }

          assert_equal(
            "https://github.com/scryer-media/weaver/releases/download/weaver-v1.2.3/weaver-linux-x86_64-haswell.tar.gz",
            WeaverUsenetReleaseSelection.asset_url(repo: "scryer-media/weaver", version: "1.2.3", os: "linux", arch: "x86_64", lane: "haswell"),
            "linux x86 url",
          )
          assert_equal(
            "linux-arm-cortex-a76",
            WeaverUsenetReleaseSelection.asset_sha256(os: "linux", arch: "arm64", lane: "cortex-a76", checksums: checksums),
            "linux arm sha",
          )
          assert_equal(
            "darwin-x86-portable",
            WeaverUsenetReleaseSelection.asset_sha256(os: "macos", arch: "x86_64", lane: "portable", checksums: checksums),
            "macos x86 sha",
          )
          RUBY
      - name: Publish Homebrew tap update
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#weaver-v}"

          git clone "https://${TAP_TOKEN}@github.com/scryer-media/homebrew-weaver.git" tap-repo
          mkdir -p tap-repo/Formula
          cp formula/weaver-usenet.rb tap-repo/Formula/weaver-usenet.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/weaver-usenet.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
          else
            git commit -m "weaver ${VERSION}"
            git push origin HEAD:main
          fi
      - name: Trigger marketing site rebuild
        continue-on-error: true
        env:
          WEB_TOKEN: ${{ secrets.WEB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$WEB_TOKEN" ]; then
            echo "WEB_DISPATCH_TOKEN not set; skipping site rebuild."
            exit 0
          fi
          git clone "https://${WEB_TOKEN}@github.com/scryer-media/web.git" web-repo
          cd web-repo
          git config user.name "github-actions[bot]"
          git config user.email "133935777+NZBMan@users.noreply.github.com"
          git commit --allow-empty -m "rebuild: ${{ github.ref_name }}"
          git push origin HEAD:main
