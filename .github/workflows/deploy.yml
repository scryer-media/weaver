name: ci

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "weaver-v*"

concurrency:
  group: weaver-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "25"
  RUST_TOOLCHAIN: "1.95"
  WEAVER_ENABLE_DIAGNOSTICS: "0"
  WEB_ARTIFACT_NAME: weaver-web-dist

jobs:
  # ── Parallel lint / check jobs (no dependencies) ─────────────────────────

  web-build:
    name: web-build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/weaver-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/weaver-web
        run: npm ci
      - name: Lint
        working-directory: apps/weaver-web
        run: npm run lint
      - name: Build web app
        working-directory: apps/weaver-web
        run: npm run build
      - name: Verify static output
        run: test -f apps/weaver-web/dist/index.html
      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
          if-no-files-found: error
          retention-days: 14

  rust-fmt:
    name: rust-fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Check formatting
        run: cargo fmt --check

  rust-audit:
    name: rust-audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0134

  # ── Jobs that need the web artifact ──────────────────────────────────────

  rust-clippy:
    name: rust-clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Run clippy
        run: cargo clippy --workspace --locked --lib --bins --tests --examples --target x86_64-unknown-linux-musl -- -D warnings

  rust-test:
    name: rust-test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Run workspace tests
        run: cargo test --workspace --locked --target x86_64-unknown-linux-musl

  rust-test-arm:
    name: rust-test-arm
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install musl target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "aarch64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Run ARM-specific crate tests (NEON, CLMUL, PMULL)
        run: cargo test --locked -p weaver-par2 -p weaver-yenc -p weaver-rar --features weaver-par2/slow-tests --target aarch64-unknown-linux-musl

  rust-test-sde:
    name: rust-test-sde-${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: icl-gfni-avx2
            rustflags: "-C target-feature=+avx2,+gfni,+ssse3"
            sde_arch: "-icl"
          - name: spr-gfni-avx512
            rustflags: "-C target-feature=+avx512f,+avx512bw,+avx512vl,+avx512vbmi2,+avx2,+gfni,+ssse3"
            sde_arch: "-spr"
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Install Intel SDE
        run: |
          SDE_ARCHIVE="ci/vendor/intel-sde/sde-external-9.48.0-2024-11-25-lin.tar.xz"
          echo "3173d2a5369e3385226b488d8b75403951bc14af601435fe707d9f83e0b533e6  ${SDE_ARCHIVE}" > /tmp/sde.sha256
          sha256sum -c /tmp/sde.sha256
          tar -xf "${SDE_ARCHIVE}" -C /opt
          echo "/opt/sde-external-9.48.0-2024-11-25-lin" >> "$GITHUB_PATH"
      - name: Build accelerated SIMD tests (${{ matrix.name }})
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -o pipefail
          cargo test --package weaver-par2 --lib --test repair_stress --test real_world_generated --features slow-tests --no-run --locked --target x86_64-unknown-linux-musl --message-format=json \
            | jq -r 'select(.executable != null and .profile.test == true) | .executable' \
            | sort -u > /tmp/test-bins.txt
          cargo test --package weaver-yenc --lib --no-run --locked --target x86_64-unknown-linux-musl --message-format=json \
            | jq -r 'select(.executable != null and .profile.test == true) | .executable' \
            >> /tmp/test-bins.txt
          sort -u -o /tmp/test-bins.txt /tmp/test-bins.txt
      - name: Run tests under Intel SDE (${{ matrix.name }})
        run: |
          while IFS= read -r bin; do
            echo "::group::$(basename "$bin")"
            case "$(basename "$bin")" in
              weaver_par2-*)
                sde64 ${{ matrix.sde_arch }} -- "$bin" gf_simd::tests:: --test-threads=1
                ;;
              repair_stress-*)
                sde64 ${{ matrix.sde_arch }} -- "$bin" repair_single_file_4mb_8_missing --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" repair_large_slices --exact --test-threads=1
                ;;
              real_world_generated-*)
                sde64 ${{ matrix.sde_arch }} -- "$bin" repairs_missing_middle_volume_and_extracts_rar5_lz --exact --test-threads=1
                ;;
              weaver_yenc-*)
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::decode_normal_run_dispatches --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::sse2_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::sse2_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::sse2_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::ssse3_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::ssse3_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::ssse3_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::sse41_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::sse41_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::sse41_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx2_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx2_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx2_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx512_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx512_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx512_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx512_vbmi2_block_compacts_escapes_and_line_breaks --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx512_vbmi2_block_handles_dot_stuffed_line_start --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" simd::tests::avx512_vbmi2_block_preserves_trailing_cr_state --exact --test-threads=1
                sde64 ${{ matrix.sde_arch }} -- "$bin" decode::tests::decode_body_rapidyenc_generic_special_pattern --exact --test-threads=1
                ;;
              *)
                echo "unexpected SDE test binary: $(basename "$bin")" >&2
                exit 1
                ;;
            esac
            echo "::endgroup::"
          done < /tmp/test-bins.txt

  rust-yenc-simd-targets:
    name: rust-yenc-simd-${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: armv7-neon
            target: armv7-unknown-linux-gnueabihf
            target_env: ARMV7_UNKNOWN_LINUX_GNUEABIHF
            rustflags: "-C target-feature=+neon"
          - name: riscv64gc
            target: riscv64gc-unknown-linux-gnu
            target_env: RISCV64GC_UNKNOWN_LINUX_GNU
            rustflags: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: yenc-simd-${{ matrix.name }}
      - name: Check weaver-yenc target
        env:
          TARGET_ENV: ${{ matrix.target_env }}
          TARGET_RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [ -n "$TARGET_RUSTFLAGS" ]; then
            export "CARGO_TARGET_${TARGET_ENV}_RUSTFLAGS=$TARGET_RUSTFLAGS"
          fi
          cargo check --locked -p weaver-yenc --target ${{ matrix.target }}

  rust-crypto-targets:
    name: rust-crypto-${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux-x86_64-portable
            runs_on: ubuntu-24.04
            lane: portable
          - target: x86_64-unknown-linux-musl
            platform: linux-x86_64-haswell
            runs_on: ubuntu-24.04
            lane: haswell
          - target: aarch64-unknown-linux-musl
            platform: linux-arm64-portable
            runs_on: ubuntu-24.04-arm
            lane: portable
          - target: aarch64-unknown-linux-musl
            platform: linux-arm64-cortex-a76
            runs_on: ubuntu-24.04-arm
            lane: cortex-a76
          - target: aarch64-apple-darwin
            platform: darwin-arm64-portable
            runs_on: macos-26
            lane: portable
          - target: aarch64-apple-darwin
            platform: darwin-arm64-apple-m1
            runs_on: macos-26
            lane: apple-m1
          - target: x86_64-apple-darwin
            platform: darwin-x86_64-portable
            runs_on: macos-26
            lane: portable
          - target: x86_64-apple-darwin
            platform: darwin-x86_64-haswell
            runs_on: macos-26
            lane: haswell
          - target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            runs_on: windows-2025-vs2026
            lane: portable
          - target: aarch64-pc-windows-msvc
            platform: windows-arm64
            runs_on: windows-11-arm
            lane: portable
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Install musl toolchain
        if: contains(matrix.target, '-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - name: Install NASM (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y nasm
      - name: Install NASM (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: brew install nasm
      - name: Install NASM (Windows x86_64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/win64/nasm-2.16.03-win64.zip"
          Invoke-WebRequest $url -OutFile nasm.zip
          Expand-Archive nasm.zip -DestinationPath C:\nasm
          $dir = (Get-ChildItem C:\nasm -Directory | Select-Object -First 1).FullName
          echo "$dir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Exclude build dir from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: crypto-${{ matrix.platform }}
      - name: Verify target crypto config
        run: cargo run -p xtask --locked -- verify-crypto-target --target "${{ matrix.target }}" --lane "${{ matrix.lane }}"
      - name: Set target CPU flags (Unix)
        if: runner.os != 'Windows'
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "${{ matrix.target }}" --lane "${{ matrix.lane }}")" >> "$GITHUB_ENV"
      - name: Set target CPU flags (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $flags = cargo run -p xtask --locked -- print-rustflags --ci --target "${{ matrix.target }}" --lane "${{ matrix.lane }}"
          "RUSTFLAGS=$flags" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: Check native crypto crates
        run: cargo check --locked -p weaver-rar -p weaver-par2 --target ${{ matrix.target }}

  # ── Release packaging (tag pushes only) ──────────────────────────────────

  rust-package-linux-x86_64-portable:
    name: rust-package-linux-x86_64-portable
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-x86_64-portable
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target x86_64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/x86_64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-x86_64-portable.tar.gz -C dist/package .
          test -f weaver-linux-x86_64-portable.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-x86_64-portable-${{ github.run_id }}
          path: weaver-linux-x86_64-portable.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-linux-x86_64-haswell:
    name: rust-package-linux-x86_64-haswell
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold nasm
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-x86_64-haswell
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-unknown-linux-musl" --lane haswell)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target x86_64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/x86_64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-x86_64-haswell.tar.gz -C dist/package .
          test -f weaver-linux-x86_64-haswell.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-x86_64-haswell-${{ github.run_id }}
          path: weaver-linux-x86_64-haswell.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-linux-arm64-portable:
    name: rust-package-linux-arm64-portable
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-arm64-portable
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        run: |
          printf 'RUSTFLAGS=%s\n' "$(cargo run -p xtask --locked -- print-rustflags --ci --target "aarch64-unknown-linux-musl" --lane portable)" >> "$GITHUB_ENV"
      - name: Build release binary
        run: |
          mold -run cargo build -p weaver --release --locked --target aarch64-unknown-linux-musl
      - name: Package tarball
        run: |
          mkdir -p dist/package
          cp target/aarch64-unknown-linux-musl/release/weaver dist/package/weaver
          tar -czf weaver-linux-arm64-portable.tar.gz -C dist/package .
          test -f weaver-linux-arm64-portable.tar.gz
      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: weaver-linux-arm64-portable-${{ github.run_id }}
          path: weaver-linux-arm64-portable.tar.gz
          if-no-files-found: error
          retention-days: 14

  rust-package-linux-arm64-cortex-a76:
    name: rust-package-linux-arm64-cortex-a76
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    needs: [web-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools mold
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-linux-arm64-cortex-a76
      - name: Download embedded web artifact
