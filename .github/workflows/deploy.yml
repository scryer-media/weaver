  rust-package-windows-x86_64:
    name: rust-package-windows-x86_64
    runs-on: windows-2025-vs2026
    timeout-minutes: 60
    needs: [web-build]
    env:
      CARGO_INCREMENTAL: "0"
      # Windows builds use the rustls/aws-lc TLS backend; s2n-tls is a
      # cfg(not(windows)) dependency and is never compiled here.
      CC_x86_64_pc_windows_msvc: clang-cl
      CXX_x86_64_pc_windows_msvc: clang-cl
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_CACHE_SIZE: 10G
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_IDLE_TIMEOUT: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Restore sccache directory
        id: windows-x86_64-sccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}\.sccache
          key: gha-sccache-v1-weaver-package-windows-x86_64-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-weaver-package-windows-x86_64-
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Install NASM
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/3.01/win64/nasm-3.01-win64.zip"
          $expectedSha256 = "e0ba5157007abc7b1a65118a96657a961ddf55f7e3f632ee035366dfce039ca4"
          Invoke-WebRequest $url -OutFile nasm.zip
          $actualSha256 = (Get-FileHash nasm.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "NASM checksum mismatch: expected $expectedSha256, got $actualSha256"
          }
          Expand-Archive nasm.zip -DestinationPath C:\nasm
          $dir = (Get-ChildItem C:\nasm -Directory | Select-Object -First 1).FullName
          $dir | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Exclude build dir from Windows Defender
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction Stop
          } catch {
            Write-Warning "Unable to configure Windows Defender exclusion: $($_.Exception.Message)"
          }
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          cache-on-failure: false
          key: package-windows-x86_64
      - name: Prime sccache server
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          sccache --start-server
          sccache --zero-stats
      - name: Download embedded web artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WEB_ARTIFACT_NAME }}
          path: apps/weaver-web/dist
      - name: Set target CPU flags
        shell: pwsh
        run: |
          $flags = cargo run -p xtask --locked -- print-rustflags --ci --target "x86_64-pc-windows-msvc" --lane portable
          "RUSTFLAGS=$flags" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: Build release binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build -p weaver --release --locked --target x86_64-pc-windows-msvc 2>&1 | Tee-Object -FilePath weaver-windows-x86_64-build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Verify embedded Windows manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "target\x86_64-pc-windows-msvc\release\weaver.exe"
          $mt = (Get-Command mt.exe -ErrorAction SilentlyContinue).Source
          if (-not $mt) {
            $mt = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter mt.exe |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $mt) {
            throw "mt.exe was not found; cannot verify embedded Windows manifest"
          }
          & $mt -nologo "-inputresource:$exe;#1" "-out:embedded-manifest.xml"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $manifest = Get-Content embedded-manifest.xml -Raw
          if ($manifest -notmatch '<[^>]*longPathAware\b[^>]*>\s*true\s*</[^>]*longPathAware>') {
            throw "embedded manifest does not contain longPathAware=true"
          }
      - name: Verify Windows runtime dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "target\x86_64-pc-windows-msvc\release\weaver.exe"
          $out = "weaver-windows-x86_64-dependencies.txt"
          $dumpbin = (Get-Command dumpbin.exe -ErrorAction SilentlyContinue).Source
          if (-not $dumpbin) {
            $roots = @("${env:ProgramFiles}\Microsoft Visual Studio", "${env:ProgramFiles(x86)}\Microsoft Visual Studio")
            foreach ($root in $roots) {
              if ((-not $dumpbin) -and (Test-Path $root)) {
                $dumpbin = Get-ChildItem $root -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue |
                  Sort-Object FullName -Descending |
                  Select-Object -First 1 -ExpandProperty FullName
              }
            }
          }
          if (-not $dumpbin) {
            throw "dumpbin.exe was not found; cannot verify Windows runtime dependencies"
          }
          & $dumpbin /dependents $exe 2>&1 | Tee-Object -FilePath $out
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $dependents = Get-Content $out -Raw
          if ($dependents -match '(?i)\b(?:vcruntime|msvcp)\d*[^\\/\s]*\.dll\b') {
            throw "Windows package depends on Visual C++ runtime DLLs; expected static CRT"
          }
      - name: Smoke test release binary startup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "target\x86_64-pc-windows-msvc\release\weaver.exe"
          $smokeRoot = Join-Path $env:RUNNER_TEMP "weaver-startup-smoke-x86_64"
          $configDir = Join-Path $smokeRoot "config"
          $logFile = Join-Path $smokeRoot "weaver.log"
          $artifactLog = "weaver-windows-x86_64-startup.log"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null

          function Show-SmokeLog {
            if (Test-Path $logFile) {
              Write-Host "----- Weaver startup log tail -----"
              Get-Content $logFile -Tail 160
              Write-Host "----- End Weaver startup log tail -----"
            } else {
              Write-Host "Weaver startup log was not created at $logFile"
            }
          }

          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Parse("127.0.0.1"), 0)
          $listener.Start()
          $port = ([System.Net.IPEndPoint]$listener.LocalEndpoint).Port
          $listener.Stop()

          $env:WEAVER_HTTP_BIND_ADDRESS = "127.0.0.1"

          $process = $null
          try {
            $args = @("--config", $configDir, "--log-file", $logFile, "serve", "--port", "$port")
            $process = Start-Process -FilePath $exe -ArgumentList $args -PassThru
            $baseUrl = "http://127.0.0.1:$port"
            $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
            $deadline = (Get-Date).AddSeconds(30)
            $lastError = $null
            $ready = $false

            while ((Get-Date) -lt $deadline) {
              if ($process.HasExited) {
                throw "Weaver exited before API readiness with code $($process.ExitCode)"
              }
              try {
                $spa = Invoke-WebRequest -Uri "$baseUrl/" -WebSession $session -TimeoutSec 5
                if ($spa.StatusCode -ne 200) {
                  throw "SPA returned HTTP $($spa.StatusCode)"
                }
                $payload = @{ query = "query { systemStatus { version } }" } | ConvertTo-Json -Compress
                $api = Invoke-WebRequest -Uri "$baseUrl/graphql" -Method Post -ContentType "application/json" -Body $payload -WebSession $session -TimeoutSec 5
                $responseText = if ($api.Content -is [byte[]]) {
                  [System.Text.Encoding]::UTF8.GetString($api.Content)
                } else {
                  [string]$api.Content
                }
                $json = $responseText | ConvertFrom-Json
                if ($json.errors) {
                  throw "GraphQL errors: $($json.errors | ConvertTo-Json -Compress -Depth 8)"
                }
                if (-not $json.data.systemStatus.version) {
                  throw "GraphQL systemStatus did not include a version"
                }
                Write-Host "Weaver startup API smoke test passed with version $($json.data.systemStatus.version)"
                $ready = $true
                break
              } catch {
                $lastError = $_.Exception.Message
                Start-Sleep -Milliseconds 500
              }
            }

            if (-not $ready) {
              throw "Timed out waiting for Weaver API readiness. Last error: $lastError"
            }
          } catch {
            Write-Error $_
            Show-SmokeLog
            throw
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -ErrorAction SilentlyContinue
              try {
                Wait-Process -Id $process.Id -Timeout 10 -ErrorAction Stop
              } catch {
                Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              }
            }
            if (Test-Path $logFile) {
              Copy-Item $logFile $artifactLog -Force
            } else {
              "Weaver startup log was not created at $logFile" | Set-Content $artifactLog
            }
          }
      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path target\x86_64-pc-windows-msvc\release\weaver.exe -DestinationPath weaver-windows-x86_64.zip
          if (-not (Test-Path weaver-windows-x86_64.zip)) { throw "missing weaver-windows-x86_64.zip" }
      - name: Validate packaged Windows artifact
        shell: pwsh
        run: |
          .\.github\scripts\validate-windows-package.ps1 `
            -Architecture x86_64 `
            -ZipPath weaver-windows-x86_64.zip `
            -BuiltExePath target\x86_64-pc-windows-msvc\release\weaver.exe
      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats | Tee-Object -FilePath weaver-windows-x86_64-sccache-stats.txt
          } else {
            "sccache not installed; skipping stats" | Tee-Object -FilePath weaver-windows-x86_64-sccache-stats.txt
          }
      - name: Upload release package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: weaver-windows-x86_64-${{ github.run_id }}
          path: |
            weaver-windows-x86_64.zip
            weaver-windows-x86_64-build.log
            weaver-windows-x86_64-dependencies.txt
            weaver-windows-x86_64-startup.log
            weaver-windows-x86_64-defender-scan.log
            weaver-windows-x86_64-attachment-services.log
            weaver-windows-x86_64-noarg-startup.log
            weaver-windows-x86_64-winget-install.log
            weaver-windows-x86_64-sccache-stats.txt
          if-no-files-found: error
          retention-days: 14
      - name: Save sccache directory
        if: always() && steps.windows-x86_64-sccache-restore.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}\.sccache
          key: ${{ steps.windows-x86_64-sccache-restore.outputs.cache-primary-key }}

