[workspace]
members = [
    "crates/weaver",
    "crates/weaver-core",
    "crates/weaver-nntp",
    "crates/weaver-nzb",
    "crates/weaver-yenc",
    "crates/weaver-assembly",
    "crates/weaver-par2",
    "crates/weaver-rar",
    "crates/weaver-scheduler",
    "crates/weaver-state",
    "crates/weaver-api",
]
resolver = "2"

[workspace.package]
version = "0.1.39"
edition = "2024"
license = "GPL-3.0-or-later"
repository = "https://github.com/scryer-media/weaver"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = { version = "0.1", features = ["release_max_level_info"] }
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
bytes = "1"
async-graphql = "7.0"
crc32fast = "1.4"
md-5 = "0.10"
blake2 = "0.10"
aes = "0.8"
aes-gcm = "0.10"
cbc = "0.1"
pbkdf2 = "0.12"
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.12"
argon2 = "0.5"
getrandom = "0.3"
hex = "0.4"
rayon = "1.10"
libc = "0.2"
tokio-rustls = { version = "0.26", features = ["ring"] }
rustls-pemfile = "2"
webpki-roots = "1"
tokio-util = { version = "0.7", features = ["codec"] }
pin-project-lite = "0.2"
quick-xml = "0.37"
crossbeam-queue = "0.3"
bitvec = "1.0"
rmp-serde = "1.3"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
axum = "0.8"
tower-http = { version = "0.6", features = ["cors", "compression-gzip", "compression-br", "compression-zstd", "decompression-gzip", "decompression-br", "decompression-zstd"] }
rust-embed = "8"
mime_guess = "2"
async-graphql-axum = "7.0"
socket2 = { version = "0.5", features = ["all"] }
memchr = "2"
rusqlite = { version = "0.34", features = ["bundled"] }
tempfile = "3"
zstd = "0.13"
chrono = { version = "0.4", features = ["clock", "serde"] }
sevenz-rust2 = { version = "0.20", features = ["aes256", "bzip2", "deflate"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "gzip"] }
feed-rs = "2.3"
regex = "1.11"
tar = "0.4"
zip = "2"
flate2 = "1"
base64 = "0.22"
security-framework = "3"
security-framework-sys = "2"
keyring = { version = "3", default-features = false, features = ["windows-native"] }
scryer-release-parser = { git = "https://github.com/scryer-media/scryer.git", package = "scryer-release-parser", rev = "114688d" }

[profile.release]
lto = "thin"
codegen-units = 1
