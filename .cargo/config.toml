# Enable hardware-accelerated crypto backends on ARM.
#
# Without these flags, RustCrypto crates fall back to software:
#   - aes: software fixslice (~30% of CPU in profile)
#   - chacha20: software scalar (~40% of CPU in profile)
#
# On x86_64, both aes (AES-NI) and chacha20 (AVX2/SSE2) use runtime
# auto-detection — no flags needed.

[target.aarch64-apple-darwin]
rustflags = ["--cfg", "aes_armv8", "--cfg", "chacha20_force_neon"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["--cfg", "aes_armv8", "--cfg", "chacha20_force_neon"]

[target.aarch64-unknown-linux-musl]
rustflags = ["--cfg", "aes_armv8", "--cfg", "chacha20_force_neon"]
