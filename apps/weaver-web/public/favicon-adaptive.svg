<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .dark {
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      .light {
        display: none;
      }

      .dark {
        display: block;
      }
    }
  </style>
  <image class="light" href="favicon-light-32.png" width="32" height="32" />
  <image class="dark" href="favicon-dark-32.png" width="32" height="32" />
</svg>
